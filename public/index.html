<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let books = [], annotations = {};
let readerBookId = null, pdfDoc = null, pageNum = 1;
let rendering = false, pendingPage = null, deleteTargetId = null, searchQuery = '';
let activeTool = 'select', isPointerDown = false;
let drawColor = '#2d6a4f', brushSize = 3, eraserSize = 20, hlColor = '#ffff0099';
let lx = 0, ly = 0;
let currentStrokes = [], currentHlRects = [], activeStroke = [];
let hlStart = null, hlDragging = false;

// ========== MIGRATION: Clear old localStorage data ==========
function migrateFromLocalStorage() {
    if (localStorage.getItem('rw_migrated_v3')) return;
    
    const oldBooks = localStorage.getItem('rw_books_v3');
    const oldAnn = localStorage.getItem('rw_ann');
    
    if (oldBooks || oldAnn) {
        console.log('Migrating old library data...');
        // Clear old storage
        localStorage.removeItem('rw_books_v3');
        localStorage.removeItem('rw_ann');
        localStorage.removeItem('rw_books_v2');
        localStorage.removeItem('rw_ann_v2');
    }
    
    localStorage.setItem('rw_migrated_v3', 'true');
    
    if (oldBooks || oldAnn) {
        toast('Storage upgraded! Page will refresh.', 'success');
        setTimeout(() => location.reload(), 1500);
        return true;
    }
    return false;
}

// ========== INDEXEDDB STORAGE ==========
let dbPromise = null;
function openDB() {
    if (dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open('ReadwiseDB', 3);
        req.onerror = () => reject(req.error);
        req.onsuccess = () => resolve(req.result);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('books')) {
                db.createObjectStore('books', { keyPath: 'id' });
            }
            if (!db.objectStoreNames.contains('annotations')) {
                db.createObjectStore('annotations', { keyPath: 'id' });
            }
        };
    });
    return dbPromise;
}

async function saveBooks() {
    try {
        const db = await openDB();
        const tx = db.transaction('books', 'readwrite');
        const store = tx.objectStore('books');
        for (const b of books) store.put(b);
        await tx.done;
    } catch(e) { console.warn(e); toast('Save failed', 'error'); }
}

async function loadBooks() {
    try {
        const db = await openDB();
        const tx = db.transaction('books', 'readonly');
        const store = tx.objectStore('books');
        const all = await store.getAll();
        if (all.length) books = all;
    } catch(e) { console.warn(e); }
}

async function saveAnn() {
    try {
        const db = await openDB();
        const tx = db.transaction('annotations', 'readwrite');
        const store = tx.objectStore('annotations');
        store.put({ id: 'main', data: annotations });
        await tx.done;
    } catch(e) { console.warn(e); }
}

async function loadAnn() {
    try {
        const db = await openDB();
        const tx = db.transaction('annotations', 'readonly');
        const store = tx.objectStore('annotations');
        const record = await store.get('main');
        if (record && record.data) annotations = record.data;
    } catch(e) { console.warn(e); }
}

// ========== INIT ==========
async function init() {
    // First, clear any old localStorage data
    const migrated = migrateFromLocalStorage();
    if (migrated) return; // Page will reload
    
    await loadBooks();
    await loadAnn();
    
    const th = localStorage.getItem('rw_theme') || 'light';
    document.documentElement.setAttribute('data-theme', th);
    updateThemeIcon(th);
    renderLibrary();
    updateSidebar();
    setupDragDrop();
    setupCanvasEvents();
}

// Helper functions
function toast(msg, type = 'success') {
    const w = document.getElementById('toastWrap');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    w.appendChild(t);
    setTimeout(() => {
        t.style.opacity = '0';
        setTimeout(() => t.remove(), 300);
    }, 2500);
}

function toggleDark() {
    const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', n);
    localStorage.setItem('rw_theme', n);
    updateThemeIcon(n);
}

function updateThemeIcon(t) {
    const moon = '🌙', sun = '☀️';
    const ic = t === 'dark' ? sun : moon;
    const themeIcon = document.getElementById('themeIcon');
    const mThemeIcon = document.getElementById('mThemeIcon');
    if (themeIcon) themeIcon.innerHTML = ic;
    if (mThemeIcon) mThemeIcon.innerHTML = ic;
}

function navigate(page) {
    document.querySelectorAll('[data-page]').forEach(n => n.classList.remove('active'));
    document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
    document.getElementById('topbarTitle').innerText = page === 'library' ? 'Library' : 'Reading Stats';
    const searchWrap = document.getElementById('searchWrap');
    if (searchWrap) searchWrap.style.display = page === 'library' ? '' : 'none';
    document.querySelectorAll('.content .page').forEach(p => p.classList.remove('active'));
    if (page === 'library') {
        document.getElementById('libraryPage').classList.add('active');
        renderLibrary();
    } else if (page === 'stats') {
        document.getElementById('statsPage').classList.add('active');
        renderStats();
    }
    closeSidebar();
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
}

function setupDragDrop() {
    const z = document.getElementById('uploadZone');
    if (!z) return;
    z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('drag-over'); });
    z.addEventListener('dragleave', () => z.classList.remove('drag-over'));
    z.addEventListener('drop', e => { e.preventDefault(); z.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
}

function fmtSize(b) { return b < 1048576 ? (b / 1024).toFixed(0) + ' KB' : (b / 1048576).toFixed(1) + ' MB'; }

function handleFiles(files) {
    [...files].forEach(f => {
        if (f.type !== 'application/pdf') { toast(f.name + ' is not a PDF', 'error'); return; }
        if (books.find(b => b.name === f.name)) { toast('"' + f.name + '" already exists', 'error'); return; }
        const reader = new FileReader();
        reader.onload = e => {
            const id = 'b' + Date.now() + Math.floor(Math.random() * 9999);
            const b = {
                id, name: f.name, displayName: f.name.replace('.pdf', '').replace(/_/g, ' '),
                size: fmtSize(f.size), dataUrl: e.target.result, totalPages: 0,
                currentPage: 1, status: 'pending', addedAt: Date.now(), cover: null
            };
            books.push(b);
            pdfjsLib.getDocument(e.target.result).promise.then(pdf => {
                b.totalPages = pdf.numPages;
                pdf.getPage(1).then(pg => {
                    const vp = pg.getViewport({ scale: 0.5 });
                    const c = document.createElement('canvas');
                    c.width = vp.width; c.height = vp.height;
                    pg.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise.then(() => {
                        b.cover = c.toDataURL('image/jpeg', 0.65);
                        saveBooks(); renderLibrary(); updateSidebar();
                    });
                });
                saveBooks(); renderLibrary(); updateSidebar();
            }).catch(() => { saveBooks(); renderLibrary(); updateSidebar(); });
            toast('📖 "' + b.displayName + '" added!', 'success');
        };
        reader.readAsDataURL(f);
    });
}

function handleSearch() { searchQuery = document.getElementById('searchInput').value.toLowerCase(); renderLibrary(); }

function bookCard(b) {
    const pct = b.totalPages ? Math.round((b.currentPage / b.totalPages) * 100) : 0;
    const ems = ['📘', '📗', '📙', '📕', '📓', '📔'];
    const em = ems[Math.abs(b.name.length * 3) % 6];
    const coverHtml = b.cover ? `<img src="${b.cover}" style="width:100%;height:100%;object-fit:cover;">` : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#2d6a4f22,#52b78855);display:flex;align-items:center;justify-content:center;font-size:2.8rem;">${em}</div>`;
    const badgeCls = b.status === 'pending' ? 'badge-pending' : b.status === 'reading' ? 'badge-reading' : 'badge-completed';
    const badgeTx = b.status === 'pending' ? '🕐 Pending' : b.status === 'reading' ? '📖 Reading' : '✅ Done';
    const hlN = getHlCount(b.id);
    return `<div class="book-card" data-book-id="${b.id}">
        <div class="book-cover">${coverHtml}<div class="book-badge ${badgeCls}">${badgeTx}</div></div>
        <div class="book-body">
            <div class="book-title">${b.displayName}</div>
            <div class="book-size">${b.size}${b.totalPages ? ' · ' + b.totalPages + ' pp' : ''}${hlN ? ' · 🖊' + hlN : ''}</div>
            <select class="status-select" onchange="changeStatus('${b.id}',this.value)" onclick="event.stopPropagation()">
                <option value="pending" ${b.status === 'pending' ? 'selected' : ''}>🕐 Pending</option>
                <option value="reading" ${b.status === 'reading' ? 'selected' : ''}>📖 Reading</option>
                <option value="completed" ${b.status === 'completed' ? 'selected' : ''}>✅ Completed</option>
            </select>
            <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
            <div class="book-meta">
                <div class="book-progress-text">p.${b.currentPage}${b.totalPages ? ' / ' + b.totalPages : ''} · ${pct}%</div>
                <div class="book-actions">
                    <button class="action-btn read" onclick="openReader('${b.id}')">▶</button>
                    <button class="action-btn del" onclick="askDelete('${b.id}')">🗑</button>
                </div>
            </div>
        </div>
    </div>`;
}

function renderLibrary() {
    const flt = books.filter(b => b.displayName.toLowerCase().includes(searchQuery) || b.name.toLowerCase().includes(searchQuery));
    const grps = { pending: flt.filter(b => b.status === 'pending'), reading: flt.filter(b => b.status === 'reading'), completed: flt.filter(b => b.status === 'completed') };
    ['pending', 'reading', 'completed'].forEach(s => {
        const grid = document.getElementById(s === 'reading' ? 'readingGrid' : s + 'Grid');
        const count = document.getElementById(s === 'reading' ? 'readingCount' : s + 'Count');
        const sect = document.getElementById(s === 'reading' ? 'readingSection' : s + 'Section');
        if (count) count.textContent = grps[s].length + ' book' + (grps[s].length !== 1 ? 's' : '');
        if (sect) sect.style.display = grps[s].length ? '' : 'none';
        if (grid) grid.innerHTML = grps[s].map(bookCard).join('');
    });
    const emptyState = document.getElementById('emptyState');
    if (emptyState) emptyState.style.display = flt.length === 0 ? 'block' : 'none';
}

function changeStatus(id, status) { const b = books.find(b => b.id === id); if (!b) return; b.status = status; saveBooks(); renderLibrary(); updateSidebar(); }
function getHlCount(id) { if (!annotations[id]) return 0; return Object.values(annotations[id]).reduce((a, pg) => a + (pg.highlights?.length || 0), 0); }
function updateSidebar() { document.getElementById('sbTotal').innerText = books.length; document.getElementById('sbDone').innerText = books.filter(b => b.status === 'completed').length; }

async function openReader(id) {
    const b = books.find(b => b.id === id);
    if (!b || !b.dataUrl) { toast('Book data missing', 'error'); return; }
    showLoading('Opening PDF…');
    readerBookId = id;
    pageNum = b.currentPage || 1;
    if (b.status === 'pending') { b.status = 'reading'; saveBooks(); }
    try {
        pdfDoc = await pdfjsLib.getDocument(b.dataUrl).promise;
        b.totalPages = pdfDoc.numPages;
        saveBooks();
        document.getElementById('readerTitle').innerText = b.displayName;
        updateCompleteBtn(b);
        document.getElementById('readerPage').classList.add('active');
        document.body.style.overflow = 'hidden';
        setTool('select');
        await renderPage(pageNum);
        hideLoading();
    } catch (err) { hideLoading(); toast('Failed to open PDF', 'error'); console.error(err); }
}

async function renderPage(num) {
    if (!pdfDoc) return;
    if (rendering) { pendingPage = num; return; }
    rendering = true;
    const page = await pdfDoc.getPage(num);
    const scroll = document.getElementById('canvasScroll');
    const maxW = Math.min(scroll.clientWidth - 48, 950);
    const scale = Math.min(maxW / page.getViewport({ scale: 1 }).width, 1.85);
    const vp = page.getViewport({ scale });
    const pdf = document.getElementById('pdfCanvas');
    const hl = document.getElementById('hlCanvas');
    const dc = document.getElementById('drawCanvas');
    [pdf, hl, dc].forEach(c => { if (c) { c.width = vp.width; c.height = vp.height; } });
    await page.render({ canvasContext: pdf.getContext('2d'), viewport: vp }).promise;
    pageNum = num;
    rendering = false;
    const b = books.find(b => b.id === readerBookId);
    if (b) { b.currentPage = num; saveBooks(); }
    loadPageAnn();
    updateReaderUI();
    renderHlPanel();
    if (pendingPage !== null) { const p = pendingPage; pendingPage = null; renderPage(p); }
}

function loadPageAnn() {
    if (!readerBookId) return;
    const pg = (annotations[readerBookId] || {})[pageNum] || { strokes: [], highlights: [] };
    currentStrokes = JSON.parse(JSON.stringify(pg.strokes || []));
    currentHlRects = JSON.parse(JSON.stringify(pg.highlights || []));
    redrawDraw();
    redrawHl();
}

function savePageAnn() {
    if (!readerBookId) return;
    if (!annotations[readerBookId]) annotations[readerBookId] = {};
    annotations[readerBookId][pageNum] = { strokes: JSON.parse(JSON.stringify(currentStrokes)), highlights: JSON.parse(JSON.stringify(currentHlRects)) };
    saveAnn();
}

function setupCanvasEvents() {
    const dc = document.getElementById('drawCanvas');
    const hl = document.getElementById('hlCanvas');
    if (!dc || !hl) return;
    dc.addEventListener('mousedown', e => { if (!drawActive()) return; e.preventDefault(); onStart(e.offsetX, e.offsetY); });
    dc.addEventListener('mousemove', e => { if (!drawActive() || !isPointerDown) return; onMove(e.offsetX, e.offsetY); });
    dc.addEventListener('mouseup', () => { if (drawActive()) onEnd(); });
    hl.addEventListener('mousedown', e => { if (activeTool !== 'highlight') return; e.preventDefault(); hlStart = { x: e.offsetX, y: e.offsetY }; hlDragging = true; });
    hl.addEventListener('mousemove', e => { if (activeTool !== 'highlight' || !hlDragging) return; drawTmpHl(hlStart.x, hlStart.y, e.offsetX, e.offsetY); });
    hl.addEventListener('mouseup', e => { if (activeTool !== 'highlight' || !hlDragging) return; finishHl(hlStart.x, hlStart.y, e.offsetX, e.offsetY); hlDragging = false; });
}

function drawActive() { return activeTool === 'pencil' || activeTool === 'eraser'; }
function onStart(x, y) { isPointerDown = true; lx = x; ly = y; activeStroke = [{ x, y }]; }
function onMove(x, y) {
    if (activeTool === 'pencil') {
        const ctx = document.getElementById('drawCanvas').getContext('2d');
        ctx.save();
        ctx.strokeStyle = drawColor;
        ctx.lineWidth = brushSize;
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.restore();
        activeStroke.push({ x, y });
    } else if (activeTool === 'eraser') {
        eraseAt(x, y);
        redrawDraw();
    }
    lx = x; ly = y;
}
function onEnd() {
    isPointerDown = false;
    if (activeTool === 'pencil' && activeStroke.length > 1) {
        currentStrokes.push({ pts: [...activeStroke], color: drawColor, size: brushSize });
        activeStroke = [];
        savePageAnn();
    } else if (activeTool === 'eraser') {
        savePageAnn();
        redrawDraw();
    }
}
function eraseAt(x, y) { const r = eraserSize / 2; currentStrokes = currentStrokes.filter(s => !s.pts.some(p => Math.hypot(p.x - x, p.y - y) < r)); }
function undoLast() { if (!currentStrokes.length) { toast('Nothing to undo', 'error'); return; } currentStrokes.pop(); redrawDraw(); savePageAnn(); }
function clearPage() { currentStrokes = []; redrawDraw(); savePageAnn(); toast('Drawings cleared', 'success'); }
function redrawDraw() {
    const dc = document.getElementById('drawCanvas');
    if (!dc) return;
    const ctx = dc.getContext('2d');
    ctx.clearRect(0, 0, dc.width, dc.height);
    currentStrokes.forEach(s => {
        if (!s.pts || s.pts.length < 2) return;
        ctx.save();
        ctx.strokeStyle = s.color;
        ctx.lineWidth = s.size;
        ctx.beginPath();
        ctx.moveTo(s.pts[0].x, s.pts[0].y);
        for (let i = 1; i < s.pts.length; i++) ctx.lineTo(s.pts[i].x, s.pts[i].y);
        ctx.stroke();
        ctx.restore();
    });
}
function drawTmpHl(x1, y1, x2, y2) {
    const hl = document.getElementById('hlCanvas');
    if (!hl) return;
    const ctx = hl.getContext('2d');
    ctx.clearRect(0, 0, hl.width, hl.height);
    currentHlRects.forEach(r => { ctx.fillStyle = r.color; ctx.fillRect(r.x, r.y, r.w, r.h); });
    ctx.fillStyle = hlColor;
    ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
}
function finishHl(x1, y1, x2, y2) {
    const w = x2 - x1, h = y2 - y1;
    if (Math.abs(w) < 5 || Math.abs(h) < 5) { redrawHl(); return; }
    const r = { x: Math.min(x1, x2), y: Math.min(y1, y2), w: Math.abs(w), h: Math.abs(h), color: hlColor, page: pageNum, id: Date.now() };
    currentHlRects.push(r);
    redrawHl();
    savePageAnn();
    renderHlPanel();
    toast('Highlight saved', 'success');
}
function redrawHl() {
    const hl = document.getElementById('hlCanvas');
    if (!hl) return;
    const ctx = hl.getContext('2d');
    ctx.clearRect(0, 0, hl.width, hl.height);
    currentHlRects.forEach(r => { ctx.fillStyle = r.color; ctx.fillRect(r.x, r.y, r.w, r.h); });
}
function delHl(id, page) {
    const nid = parseInt(id);
    if (annotations[readerBookId] && annotations[readerBookId][page]) annotations[readerBookId][page].highlights = annotations[readerBookId][page].highlights.filter(h => h.id !== nid);
    if (page === pageNum) currentHlRects = currentHlRects.filter(h => h.id !== nid);
    redrawHl();
    saveAnn();
    renderHlPanel();
}
function toggleHlPanel() {
    const p = document.getElementById('hlPanel');
    p.classList.toggle('open');
    const btn = document.getElementById('hlPanelBtn');
    if (btn) btn.classList.toggle('c-active', p.classList.contains('open'));
    renderHlPanel();
}
function renderHlPanel() {
    if (!readerBookId) return;
    const ann = annotations[readerBookId] || {};
    const all = [];
    Object.entries(ann).forEach(([pg, d]) => { (d.highlights || []).forEach(h => all.push({ ...h, page: parseInt(pg) })); });
    all.sort((a, b) => a.page - b.page);
    const sc = document.getElementById('hlScroll');
    if (!all.length) { sc.innerHTML = '<div class="hlp-empty">No highlights yet.<br>Use the highlight tool to select areas.</div>'; return; }
    sc.innerHTML = all.map(h => `<div class="hl-item" style="border-color:${h.color.slice(0,7)}"><div><span style="font-weight:600;">Highlight</span></div><div class="hl-pg">Page ${h.page}</div><button class="hl-del-btn" onclick="delHl('${h.id}',${h.page})">✕</button></div>`).join('');
}
function setTool(tool) {
    activeTool = tool;
    ['select', 'pencil', 'eraser', 'highlight'].forEach(t => {
        const btn = document.getElementById('tb' + t.charAt(0).toUpperCase() + t.slice(1));
        if (btn) btn.classList.toggle('active', t === tool);
    });
    const dc = document.getElementById('drawCanvas');
    const hl = document.getElementById('hlCanvas');
    if (dc) dc.className = '';
    if (hl) hl.className = '';
    if (tool === 'pencil' && dc) dc.classList.add('draw-active');
    else if (tool === 'eraser' && dc) dc.classList.add('erase-active');
    else if (tool === 'highlight' && hl) hl.classList.add('hl-active');
    const gDraw = document.getElementById('grpDrawColors');
    const gHl = document.getElementById('grpHlColors');
    const gEr = document.getElementById('grpEraserSize');
    if (gDraw) gDraw.style.display = tool === 'pencil' ? 'flex' : 'none';
    if (gHl) gHl.style.display = tool === 'highlight' ? 'flex' : 'none';
    if (gEr) gEr.style.display = tool === 'eraser' ? 'flex' : 'none';
}
function setDrawColor(el) { document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('sel')); el.classList.add('sel'); drawColor = el.dataset.c; }
function setHlColor(el) { document.querySelectorAll('.hl-dot').forEach(d => d.classList.remove('sel')); el.classList.add('sel'); hlColor = el.dataset.c; }
function updateReaderUI() { if (!pdfDoc) return; const total = pdfDoc.numPages; document.getElementById('prevBtn').disabled = pageNum <= 1; document.getElementById('nextBtn').disabled = pageNum >= total; document.getElementById('pageIndicator').innerText = pageNum + ' / ' + total; const pct = Math.round((pageNum / total) * 100); document.getElementById('rProgBar').style.width = pct + '%'; document.getElementById('footerPct').innerText = pct + '%'; }
function changePage(d) { if (!pdfDoc) return; const n = pageNum + d; if (n < 1 || n > pdfDoc.numPages) return; renderPage(n); }
function seekPage(e) { if (!pdfDoc) return; const rect = e.currentTarget.getBoundingClientRect(); const x = e.clientX - rect.left; const r = x / rect.width; const n = Math.max(1, Math.min(pdfDoc.numPages, Math.round(r * pdfDoc.numPages))); renderPage(n); }
function toggleComplete() { const b = books.find(b => b.id === readerBookId); if (!b) return; b.status = b.status === 'completed' ? 'reading' : 'completed'; saveBooks(); updateCompleteBtn(b); toast(b.status === 'completed' ? '🎉 Marked as completed!' : 'Back to reading', 'success'); }
function updateCompleteBtn(b) { const btn = document.getElementById('completeBtn'); if (!btn) return; btn.innerText = b.status === 'completed' ? '✓ Completed' : 'Mark Complete'; btn.style.background = b.status === 'completed' ? 'var(--green-light)' : ''; }
function closeReader() { pdfDoc = null; readerBookId = null; currentStrokes = []; currentHlRects = []; document.getElementById('readerPage').classList.remove('active'); document.getElementById('hlPanel').classList.remove('open'); document.body.style.overflow = ''; renderLibrary(); updateSidebar(); }
function askDelete(id) { deleteTargetId = id; document.getElementById('deleteModal').classList.add('show'); }
function closeDeleteModal() { deleteTargetId = null; document.getElementById('deleteModal').classList.remove('show'); }
function confirmDelete() { books = books.filter(b => b.id !== deleteTargetId); delete annotations[deleteTargetId]; saveBooks(); saveAnn(); renderLibrary(); updateSidebar(); closeDeleteModal(); toast('Book removed', 'success'); }
function renderStats() {
    const total = books.length, done = books.filter(b => b.status === 'completed').length, reading = books.filter(b => b.status === 'reading').length, pending = books.filter(b => b.status === 'pending').length;
    let totalHl = 0, totalStrokes = 0;
    Object.values(annotations).forEach(b => { Object.values(b).forEach(p => { totalHl += p.highlights?.length || 0; totalStrokes += p.strokes?.length || 0; }); });
    document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="big-num">${total}</div><div class="stat-label">Total Books</div></div><div class="stat-card"><div class="big-num">${done}</div><div class="stat-label">Completed</div></div><div class="stat-card"><div class="big-num">${reading}</div><div class="stat-label">In Progress</div></div><div class="stat-card"><div class="big-num">${pending}</div><div class="stat-label">Pending</div></div><div class="stat-card"><div class="big-num">${totalHl}</div><div class="stat-label">Highlights</div></div><div class="stat-card"><div class="big-num">${totalStrokes}</div><div class="stat-label">Drawings</div></div>`;
    const sorted = [...books].sort((a, b) => (b.currentPage / (b.totalPages || 1)) - (a.currentPage / (a.totalPages || 1)));
    document.getElementById('statsList').innerHTML = sorted.length ? sorted.map(b => { const pct = b.totalPages ? Math.round((b.currentPage / b.totalPages) * 100) : 0; return `<div class="book-list-row"><div style="font-size:1.25rem;">📖</div><div class="list-info"><div class="list-title">${b.displayName}</div><div class="list-sub">${b.status === 'pending' ? '🕐 Pending' : b.status === 'reading' ? '📖 Reading' : '✅ Done'}</div></div><div class="list-right"><div class="list-pct">${pct}%</div><div class="list-bar-wrap"><div class="list-bar" style="width:${pct}%"></div></div></div></div>`; }).join('') : '<div class="empty-state">No books yet.</div>';
}
function showLoading(t) { document.getElementById('loadingText').innerText = t || 'Loading…'; document.getElementById('loadingOverlay').classList.add('show'); }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

document.addEventListener('keydown', e => {
    const rp = document.getElementById('readerPage');
    if (!rp || !rp.classList.contains('active')) return;
    if (e.key === 'Escape') closeReader();
    if (e.key === 'ArrowRight') changePage(1);
    if (e.key === 'ArrowLeft') changePage(-1);
    if (e.key === 'p') setTool('pencil');
    if (e.key === 'e') setTool('eraser');
    if (e.key === 'h') setTool('highlight');
    if (e.key === 's') setTool('select');
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoLast(); }
});

init().catch(console.error);
</script>
